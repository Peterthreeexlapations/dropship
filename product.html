<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Product — drippppaprearl</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="pd" id="pd"></section>
    <section class="section">
      <h2>YOU MAY ALSO LIKE</h2>
      <div class="grid" id="related"></div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="./data.js"></script>
  <script src="./site.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const slug = qs("p");
      const p = PRODUCTS.find(x => x.slug === slug);
      const root = document.getElementById("pd");
      if (!p) { root.innerHTML = "<p>Product not found.</p>"; return; }
      document.title = p.title + " — " + BRAND.name;
      const sizes = p.sizes || ["S","M","L","XL","XXL"];
      window.__selectedSize = sizes[Math.min(1,sizes.length-1)];
      root.innerHTML = `
        <div class="gallery"><img src="${p.img}" alt="${p.title}" /></div>
        <div class="info">
          <h1>${p.title}</h1>
          <p class="price">${p.soldOut?'Sold Out':fmt(p.price)}</p>
          <p class="desc">${p.desc||''}</p>
          <div class="sizes">${sizes.map((s,i)=>`<button class="${i===Math.min(1,sizes.length-1)?'on':''}" onclick="window.__selectedSize='${s}';this.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${s}</button>`).join("")}</div>
          <button class="btn dark" ${p.soldOut?'disabled style=opacity:.4':''} onclick="cartAdd('${p.slug}',window.__selectedSize);alert('Added to cart — size '+window.__selectedSize)">${p.soldOut?'SOLD OUT':'ADD TO CART'}</button>
        </div>`;
      const related = PRODUCTS.filter(x => x.slug !== p.slug && x.collections.some(c => p.collections.includes(c))).slice(0,4);
      document.getElementById("related").innerHTML = related.map(productCard).join("");
    });
  </script>
</body>
</html>
