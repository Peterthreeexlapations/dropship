<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Collection — drippppaprearl</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="collection-head">
      <h1 id="title">SHOP</h1>
      <p class="count" id="count"></p>
    </section>
    <section class="grid" id="grid"></section>
  </main>
  <footer id="site-footer"></footer>
  <script src="./data.js"></script>
  <script src="./site.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const slug = qs("c") || "shop-all";
      const col = COLLECTIONS[slug] || { title: slug.toUpperCase() };
      document.getElementById("title").textContent = col.title;
      document.title = col.title + " — " + BRAND.name;
      const items = PRODUCTS.filter(p => p.collections.includes(slug));
      document.getElementById("grid").innerHTML = items.map(productCard).join("") ||
        `<p style="grid-column:1/-1;text-align:center;color:#888;padding:60px 0">No products in this collection yet.</p>`;
      document.getElementById("count").textContent = items.length + " products";
    });
  </script>
</body>
</html>
