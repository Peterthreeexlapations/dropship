<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Editorial — drippppaprearl</title>
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="collection-head"><h1>EDITORIAL</h1></section>
    <section class="posts" id="posts"></section>
  </main>
  <footer id="site-footer"></footer>
  <script src="./data.js"></script>
  <script src="./site.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("posts").innerHTML = EDITORIAL.map(p =>
        `<article class="post"><div class="date">${p.date}</div><h3>${p.title}</h3><p>${p.excerpt}</p></article>`
      ).join("");
    });
  </script>
</body>
</html>
